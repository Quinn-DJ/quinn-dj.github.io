name: Documentation
on:
  push:
    branches:
      - master
      - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install -r requirements.txt
      - run: |
          BUILD_DATE=$(TZ='Asia/Shanghai' git log -1 --date=format:'%Y-%m-%d %H:%M:%S' --pretty=format:'%cd')
          sed -i "s|^\[project.extra\]|[project.extra]\nbuild_date = \"$BUILD_DATE\"|" zensical.toml
      - run: zensical build --clean
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment