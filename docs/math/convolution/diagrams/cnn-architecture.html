<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNN 架构：从图像到分类 (LeNet)</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a2e;
    --muted: #6b7280;
    --line: #d1d5db;
    --blue: #3b82f6;
    --blue-light: #93c5fd;
    --indigo: #6366f1;
    --indigo-light: #a5b4fc;
    --orange: #f97316;
    --orange-light: #fdba74;
    --green: #10b981;
    --green-light: #6ee7b7;
    --gray: #9ca3af;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
    color: var(--fg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .diagram { max-width: 1060px; width: 100%; padding: 20px; }
  svg { display: block; width: 100%; height: auto; }
  text.title { font-size: 17px; font-weight: 700; }
  text.block-label { font-size: 10px; font-weight: 600; text-anchor: middle; }
  text.block-dim { font-size: 8.5px; fill: var(--muted); text-anchor: middle; }
  text.arrow-text { font-size: 8px; fill: var(--muted); text-anchor: middle; }
  text.legend-text { font-size: 10px; fill: var(--muted); }
  .math-note { text-align: center; margin-top: 8px; font-size: 12px; color: var(--muted); }
</style>
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(','\\)']], displayMath: [['$','$']] },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
};
</script>
<script src="https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>
<body>
<div class="diagram">
<svg viewBox="0 0 830 350" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="arrowMuted" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="var(--muted)"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="415" y="30" text-anchor="middle" class="title">CNN 架构：从图像到分类 (LeNet 风格)</text>

  <!-- ============================================================ -->
  <!-- STAGE 1: Input 28×28×1 -->
  <!-- ============================================================ -->
  <g transform="translate(15, 60)" filter="url(#shadow)">
    <!-- Depth-of-1: single square -->
    <rect x="0" y="16" width="60" height="60" rx="3" fill="#d1d5db" stroke="#9ca3af" stroke-width="1"/>
    <rect x="2" y="18" width="56" height="56" rx="2" fill="#e5e7eb" stroke="var(--gray)" stroke-width="0.5"/>
    <text x="30" y="52" class="block-label">Input</text>
    <text x="30" y="66" class="block-dim">28×28×1</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="80" y1="106" x2="115" y2="106" stroke="var(--muted)" stroke-width="1.2" marker-end="url(#arrowMuted)"/>
  <text x="98" y="98" class="arrow-text">5×5 conv</text>
  <text x="98" y="118" class="arrow-text">6 filters</text>

  <!-- ============================================================ -->
  <!-- STAGE 2: Conv1 24×24×6 -->
  <!-- ============================================================ -->
  <g transform="translate(120, 60)" filter="url(#shadow)">
    <!-- 6 layers depth -->
    <rect x="6" y="10" width="64" height="72" rx="3" fill="var(--blue)" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
    <rect x="4" y="12" width="64" height="72" rx="3" fill="var(--blue)" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
    <rect x="2" y="14" width="64" height="72" rx="3" fill="var(--blue)" stroke="#2563eb" stroke-width="1" opacity="0.7"/>
    <rect x="0" y="16" width="64" height="72" rx="3" fill="var(--blue-light)" stroke="#2563eb" stroke-width="1"/>
    <text x="32" y="54" class="block-label" fill="#1e40af">Conv1</text>
    <text x="32" y="68" class="block-dim">24×24×6</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="189" y1="106" x2="224" y2="106" stroke="var(--muted)" stroke-width="1.2" marker-end="url(#arrowMuted)"/>
  <text x="207" y="98" class="arrow-text">ReLU</text>
  <text x="207" y="118" class="arrow-text">2×2</text>
  <text x="207" y="125" class="arrow-text">max pool</text>

  <!-- ============================================================ -->
  <!-- STAGE 3: Pool1 12×12×6 -->
  <!-- ============================================================ -->
  <g transform="translate(229, 60)" filter="url(#shadow)">
    <!-- 6 layers (thinner) -->
    <rect x="6" y="26" width="64" height="40" rx="3" fill="var(--blue)" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
    <rect x="4" y="28" width="64" height="40" rx="3" fill="var(--blue)" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
    <rect x="2" y="30" width="64" height="40" rx="3" fill="var(--blue)" stroke="#2563eb" stroke-width="1" opacity="0.7"/>
    <rect x="0" y="32" width="64" height="40" rx="3" fill="var(--blue-light)" stroke="#2563eb" stroke-width="1"/>
    <text x="32" y="56" class="block-label" fill="#1e40af">Pool1</text>
    <text x="32" y="68" class="block-dim">12×12×6</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="298" y1="106" x2="333" y2="106" stroke="var(--muted)" stroke-width="1.2" marker-end="url(#arrowMuted)"/>
  <text x="316" y="98" class="arrow-text">5×5 conv</text>
  <text x="316" y="118" class="arrow-text">16 filters</text>

  <!-- ============================================================ -->
  <!-- STAGE 4: Conv2 8×8×16 -->
  <!-- ============================================================ -->
  <g transform="translate(338, 55)" filter="url(#shadow)">
    <!-- 16 layers, taller -->
    <rect x="8" y="6"  width="64" height="82" rx="3" fill="var(--indigo)" stroke="#4338ca" stroke-width="1" opacity="0.2"/>
    <rect x="6" y="8"  width="64" height="82" rx="3" fill="var(--indigo)" stroke="#4338ca" stroke-width="1" opacity="0.3"/>
    <rect x="4" y="10" width="64" height="82" rx="3" fill="var(--indigo)" stroke="#4338ca" stroke-width="1" opacity="0.5"/>
    <rect x="2" y="12" width="64" height="82" rx="3" fill="var(--indigo)" stroke="#4338ca" stroke-width="1" opacity="0.7"/>
    <rect x="0" y="14" width="64" height="82" rx="3" fill="var(--indigo-light)" stroke="#4338ca" stroke-width="1"/>
    <text x="32" y="58" class="block-label" fill="#312e81">Conv2</text>
    <text x="32" y="72" class="block-dim">8×8×16</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="407" y1="106" x2="442" y2="106" stroke="var(--muted)" stroke-width="1.2" marker-end="url(#arrowMuted)"/>
  <text x="425" y="98" class="arrow-text">ReLU</text>
  <text x="425" y="118" class="arrow-text">2×2</text>
  <text x="425" y="125" class="arrow-text">max pool</text>

  <!-- ============================================================ -->
  <!-- STAGE 5: Pool2 4×4×16 -->
  <!-- ============================================================ -->
  <g transform="translate(447, 60)" filter="url(#shadow)">
    <rect x="8" y="22" width="64" height="48" rx="3" fill="var(--indigo)" stroke="#4338ca" stroke-width="1" opacity="0.2"/>
    <rect x="6" y="24" width="64" height="48" rx="3" fill="var(--indigo)" stroke="#4338ca" stroke-width="1" opacity="0.3"/>
    <rect x="4" y="26" width="64" height="48" rx="3" fill="var(--indigo)" stroke="#4338ca" stroke-width="1" opacity="0.5"/>
    <rect x="2" y="28" width="64" height="48" rx="3" fill="var(--indigo)" stroke="#4338ca" stroke-width="1" opacity="0.7"/>
    <rect x="0" y="30" width="64" height="48" rx="3" fill="var(--indigo-light)" stroke="#4338ca" stroke-width="1"/>
    <text x="32" y="58" class="block-label" fill="#312e81">Pool2</text>
    <text x="32" y="72" class="block-dim">4×4×16</text>
  </g>

  <!-- Arrow 5→6 (Flatten) -->
  <line x1="516" y1="106" x2="555" y2="106" stroke="var(--muted)" stroke-width="1.2" marker-end="url(#arrowMuted)"/>
  <text x="536" y="98" class="arrow-text">Flatten</text>

  <!-- ============================================================ -->
  <!-- STAGE 6: Flatten 256 -->
  <!-- ============================================================ -->
  <g transform="translate(560, 28)" filter="url(#shadow)">
    <rect x="0" y="56" width="18" height="58" rx="2" fill="#d1d5db" stroke="var(--gray)" stroke-width="1"/>
    <text x="9" y="90" class="block-label" fill="var(--muted)">256</text>
  </g>

  <!-- Arrow 6→7 -->
  <line x1="583" y1="106" x2="618" y2="106" stroke="var(--muted)" stroke-width="1.2" marker-end="url(#arrowMuted)"/>
  <text x="601" y="98" class="arrow-text">FC</text>

  <!-- ============================================================ -->
  <!-- STAGE 7: FC1 120 -->
  <!-- ============================================================ -->
  <g transform="translate(623, 28)" filter="url(#shadow)">
    <rect x="0" y="42" width="28" height="84" rx="3" fill="var(--orange-light)" stroke="#ea580c" stroke-width="1"/>
    <text x="14" y="90" class="block-label" fill="#9a3412">FC1</text>
    <text x="14" y="104" class="block-dim">120</text>
  </g>

  <!-- Arrow 7→8 -->
  <line x1="656" y1="106" x2="691" y2="106" stroke="var(--muted)" stroke-width="1.2" marker-end="url(#arrowMuted)"/>
  <text x="674" y="98" class="arrow-text">FC</text>

  <!-- ============================================================ -->
  <!-- STAGE 8: FC2 84 -->
  <!-- ============================================================ -->
  <g transform="translate(696, 28)" filter="url(#shadow)">
    <rect x="0" y="50" width="24" height="68" rx="3" fill="var(--orange-light)" stroke="#ea580c" stroke-width="1"/>
    <text x="12" y="90" class="block-label" fill="#9a3412">FC2</text>
    <text x="12" y="104" class="block-dim">84</text>
  </g>

  <!-- Arrow 8→9 (Output) -->
  <line x1="725" y1="106" x2="760" y2="106" stroke="var(--muted)" stroke-width="1.2" marker-end="url(#arrowMuted)"/>
  <text x="743" y="98" class="arrow-text">FC</text>

  <!-- ============================================================ -->
  <!-- STAGE 9: Output 10 -->
  <!-- ============================================================ -->
  <g transform="translate(765, 28)" filter="url(#shadow)">
    <rect x="0" y="56" width="20" height="56" rx="3" fill="var(--green-light)" stroke="#059669" stroke-width="1"/>
    <text x="10" y="90" class="block-label" fill="#047857">Out</text>
    <text x="10" y="104" class="block-dim">10</text>
  </g>

  <!-- ============================================================ -->
  <!-- Phase labels below the flow -->
  <!-- ============================================================ -->
  <!-- Feature extraction bracket -->
  <rect x="15" y="175" width="500" height="52" rx="6" fill="#eff6ff" stroke="var(--blue)" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="265" y="196" text-anchor="middle" class="block-label" fill="#2563eb" font-size="11">特征提取 (Feature Extraction)</text>
  <text x="265" y="214" text-anchor="middle" class="block-dim" fill="var(--muted)">卷积层 + 池化层：从原始像素中学习局部特征</text>

  <!-- Classification bracket -->
  <rect x="530" y="175" width="275" height="52" rx="6" fill="#fff7ed" stroke="var(--orange)" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="667" y="196" text-anchor="middle" class="block-label" fill="#ea580c" font-size="11">分类器 (Classifier)</text>
  <text x="667" y="214" text-anchor="middle" class="block-dim" fill="var(--muted)">全连接层：综合特征，输出分类</text>

  <!-- ============================================================ -->
  <!-- Legend -->
  <!-- ============================================================ -->
  <rect x="15" y="250" width="810" height="85" rx="6" fill="var(--bg)" stroke="var(--line)" stroke-width="1"/>

  <g transform="translate(30, 268)">
    <rect x="0" y="0" width="20" height="14" rx="2" fill="var(--blue-light)" stroke="#2563eb" stroke-width="0.5"/>
    <text x="25" y="10" class="legend-text">卷积层 (Conv)：可学习的滤波器，提取局部特征</text>
  </g>

  <g transform="translate(30, 288)">
    <rect x="0" y="0" width="20" height="14" rx="2" fill="var(--blue-light)" stroke="#2563eb" stroke-width="0.5" opacity="0.5"/>
    <text x="25" y="10" class="legend-text">池化层 (Pool)：降采样，减少参数，增大感受野</text>
  </g>

  <g transform="translate(30, 308)">
    <rect x="0" y="0" width="20" height="14" rx="2" fill="var(--orange-light)" stroke="#ea580c" stroke-width="0.5"/>
    <text x="25" y="10" class="legend-text">全连接层 (FC)：综合特征，输出分类结果</text>
  </g>

  <g transform="translate(430, 268)">
    <rect x="0" y="0" width="20" height="14" rx="2" fill="var(--green-light)" stroke="#059669" stroke-width="0.5"/>
    <text x="25" y="10" class="legend-text">输出层 (Output)：10 类 (0-9) Softmax 概率</text>
    <text x="0" y="55" class="legend-text" fill="var(--muted)">总参数量 ≈ 60K (LeNet-5 用于 MNIST)</text>
  </g>

</svg>

</div>
</body>
</html>
